name: CD

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish PickDriverWeb.csproj --configuration Release --no-restore --output ./artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pickdriver-web
          path: ./artifacts/publish
